services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fni_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fni_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      FNI_API_PORT: 4100
      FNI_API_STORAGE: prisma
      FNI_LOG_LEVEL: info
      FNI_LOG_FORMAT: json
      FNI_REQUEST_LOG: "false"
      FNI_SERVE_STATIC: "true"
      FNI_STATIC_DIR: dist
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/fni_portal?schema=public
    expose:
      - "4100"
    volumes:
      - fni_documents:/app/server/.data

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      FNI_API_PORT: 4100
      FNI_API_STORAGE: prisma
      FNI_LOG_LEVEL: info
      FNI_LOG_FORMAT: json
      FNI_REQUEST_LOG: "false"
      FNI_SERVE_STATIC: "true"
      FNI_STATIC_DIR: dist
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/fni_portal?schema=public
    command: ["sh", "-lc", "npm run db:deploy && npm run db:seed"]
    profiles:
      - tools

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  fni_documents:
